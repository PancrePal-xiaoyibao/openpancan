# =============================================================================
# OpenPanCan - Nginx configuration
# =============================================================================
#
# Serves:
#   - Frontend static files (React SPA) from /usr/share/nginx/html
#   - Proxies /api/ requests to the FastAPI backend on port 8007
#
# =============================================================================

upstream backend {
    server 127.0.0.1:8007;
    keepalive 32;
}

server {
    listen 8181;
    server_name _;

    # Maximum upload size for genomic data files
    client_max_body_size 500M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/x-javascript image/svg+xml;

    # -------------------------------------------------------------------
    # Backend API proxy
    # -------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for streaming report generation
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Strip /api prefix before forwarding
        rewrite ^/api/(.*)$ /$1 break;
    }

    # -------------------------------------------------------------------
    # Health check endpoint (direct to backend)
    # -------------------------------------------------------------------
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # -------------------------------------------------------------------
    # Frontend static files (SPA)
    # -------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(?:css|js|svg|woff2?|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # -------------------------------------------------------------------
    # Deny access to hidden files
    # -------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
