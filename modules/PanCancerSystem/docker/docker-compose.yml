# =============================================================================
# OpenPanCan - Docker Compose configuration
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Main application: PanCancerSystem (FastAPI + React + Nginx)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: openpancan-app
    ports:
      - "8181:8181"    # Web interface (nginx -> frontend + API proxy)
      - "8007:8007"    # Direct backend API access
    volumes:
      - openpancan_data:/data              # SQLite database persistence
      - ./backend:/app/backend:ro          # Backend code (read-only in prod)
    environment:
      - DATABASE_URL=sqlite:////data/openpancan.db
      - PANCANCER_SYSTEM_PORT=8007
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - openpancan_net

